<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}家計簿カレンダー{% endblock %}</title>

  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      margin: 0;
      background: #f6f7f9;
      padding-bottom: 90px;
      color: #111827;
    }

    header {
      background: #14b8c6;
      color: white;
      padding: 14px 16px;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .header-right {
      display: flex;
      gap: 12px;
      align-items: center;
      font-weight: 500;
      flex-wrap: wrap;
    }

    .logout-link {
      color: white;
      text-decoration: none;
      background: rgba(255,255,255,.2);
      padding: 8px 12px;
      border-radius: 10px;
    }

    .page-shell {
      max-width: 980px;
      margin: 12px auto;
      padding: 0 12px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
    }

    .bottom-nav {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: min(92%, 420px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      background: white;
      padding: 10px;
      border-radius: 24px;
      box-shadow: 0 6px 18px rgba(0,0,0,.12);
      z-index: 1000;
    }

    .nav-item {
      text-align: center;
      text-decoration: none;
      color: #333;
      padding: 10px 0;
      border-radius: 16px;
      font-weight: 600;
    }

    .nav-item.active {
      background: #e6fafd;
      color: #14b8c6;
    }

    @media (max-width: 640px) {
      header {
        align-items: flex-start;
      }

      .header-right {
        justify-content: flex-end;
      }
    }
  </style>

  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <span>家計簿カレンダー</span>

    {% if username %}
      <div class="header-right">
        <span>{{ username }} さん</span>
        <a href="{{ url_for('logout') }}" class="logout-link">ログアウト</a>
      </div>
    {% endif %}
  </header>

  {% block body %}{% endblock %}

  <nav class="bottom-nav">
    <a href="{{ url_for('calendar') }}" class="nav-item {% if active_page == 'calendar' %}active{% endif %}">カレンダー</a>
    <a href="{{ url_for('graph') }}" class="nav-item {% if active_page == 'graph' %}active{% endif %}">グラフ</a>
    <a href="{{ url_for('analysis') }}" class="nav-item {% if active_page == 'analysis' %}active{% endif %}">分析</a>
  </nav>

  {% block scripts %}{% endblock %}
</body>
</html>
