<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}家計簿カレンダー{% endblock %}</title>
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <span>家計簿カレンダー</span>

    {% if username %}
      <div class="header-right">
        <span>{{ username }} さん</span>
        <a href="{{ url_for('logout') }}" class="logout-link">ログアウト</a>
      </div>
    {% endif %}
  </header>

  {% block body %}{% endblock %}

  <nav class="bottom-nav">
    <a href="{{ url_for('calendar') }}" class="nav-item {% if active_page == 'calendar' %}active{% endif %}">カレンダー</a>
    <a href="{{ url_for('graph') }}" class="nav-item {% if active_page == 'graph' %}active{% endif %}">グラフ</a>
    <a href="{{ url_for('analysis') }}" class="nav-item {% if active_page == 'analysis' %}active{% endif %}">分析</a>
  </nav>

  {% block scripts %}{% endblock %}
</body>
</html>
